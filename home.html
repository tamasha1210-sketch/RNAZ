<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#d4af37">
<title>ریحانة نورالزهرا</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --primary:#d4af37;
  --bg:#0a0a0a;
  --bg2:#141414;
  --bg3:#1e1e1e;
  --text:#f0f0f0;
  --text2:#aaa;
  --accent:#b8860b;
  --radius:14px;
  --font:'Vazirmatn',Tahoma,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:80px}

/* هدر */
header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid rgba(212,175,55,.2);
  padding:14px 16px 10px;
  box-shadow:0 2px 20px rgba(0,0,0,.5);
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-wrap img{
  width:46px;height:46px;border-radius:50%;border:2px solid var(--primary);object-fit:cover;
  animation:logoSpin 5s ease-in-out infinite, logoSlide 5s ease-in-out infinite, logoGlow 5s ease-in-out infinite;
  transform-origin:center center;
}
@keyframes logoSpin{
  0%{transform:translateX(0) rotate(0deg);}
  25%{transform:translateX(-18px) rotate(180deg);}
  50%{transform:translateX(0) rotate(360deg);}
  75%{transform:translateX(18px) rotate(540deg);}
  100%{transform:translateX(0) rotate(720deg);}
}
@keyframes logoSlide{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-18px);}
  75%{transform:translateX(18px);}
}
@keyframes logoGlow{
  0%,100%{box-shadow:0 0 6px rgba(212,175,55,.4),0 0 0px rgba(212,175,55,.1);}
  25%{box-shadow:0 0 18px rgba(212,175,55,.9),0 0 35px rgba(212,175,55,.5),0 0 60px rgba(212,175,55,.2);}
  50%{box-shadow:0 0 8px rgba(212,175,55,.5),0 0 15px rgba(212,175,55,.3);}
  75%{box-shadow:0 0 22px rgba(212,175,55,1),0 0 45px rgba(212,175,55,.6),0 0 80px rgba(212,175,55,.3);}
}
.shop-name{font-size:17px;font-weight:700;color:var(--primary);line-height:1.3}
.shop-sub{font-size:11px;color:var(--text2)}
.header-icons{display:flex;gap:14px}
.icon-btn{background:none;border:none;color:var(--primary);font-size:20px;cursor:pointer;position:relative}
.badge{position:absolute;top:-6px;right:-6px;background:#e53;color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* جستجو */
.search-wrap{position:relative}
.search-wrap input{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(212,175,55,.25);
  border-radius:25px;padding:9px 40px 9px 16px;color:var(--text);font-family:var(--font);
  font-size:13px;outline:none;transition:.3s;
}
.search-wrap input:focus{border-color:var(--primary);background:rgba(212,175,55,.08)}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none}

/* بنر */
.banner-wrap{margin:14px 12px;border-radius:var(--radius);overflow:hidden;position:relative;height:160px;background:linear-gradient(135deg,#1a1200,#2d2200)}
.banner-wrap img{width:100%;height:100%;object-fit:cover;opacity:.7}
.banner-text{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:20px;background:linear-gradient(90deg,rgba(0,0,0,.7),transparent)}
.banner-title{font-size:20px;font-weight:700;color:var(--primary);text-shadow:0 2px 8px rgba(0,0,0,.8)}
.banner-desc{font-size:12px;color:rgba(255,255,255,.8);margin-top:6px}
.banner-btn{margin-top:12px;display:inline-block;background:var(--primary);color:#000;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;border:none;cursor:pointer}

/* دکمه‌های اصلی */
.section{padding:0 12px;margin-top:18px}
.section-title{font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:var(--primary);border-radius:2px;display:block}
.main-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.main-btn{
  background:var(--bg3);border:1px solid rgba(212,175,55,.15);border-radius:var(--radius);
  padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:7px;
  cursor:pointer;text-decoration:none;color:var(--text);transition:.25s;
}
.main-btn:active{transform:scale(.95);background:rgba(212,175,55,.1)}
.main-btn .icon{font-size:26px;line-height:1}
.main-btn .label{font-size:11px;color:var(--text2);text-align:center;line-height:1.3}

/* پرفروش‌ها */
.products-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 12px 8px;scrollbar-width:none}
.products-scroll::-webkit-scrollbar{display:none}
.product-card{
  flex:0 0 140px;background:var(--bg3);border-radius:var(--radius);
  border:1px solid rgba(212,175,55,.12);overflow:hidden;cursor:pointer;transition:.25s;
}
.product-card:active{transform:scale(.97)}
.product-card img{width:100%;height:110px;object-fit:cover}
.product-card .p-info{padding:8px}
.product-card .p-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-card .p-price{font-size:13px;color:var(--primary);font-weight:700}
.product-card .p-price span{font-size:10px;color:var(--text2);font-weight:400}
.product-card .p-add{
  width:26px;height:26px;background:var(--primary);border:none;border-radius:50%;
  color:#000;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  float:left;margin-top:-2px;
}

/* اطلاعیه */
.notice-box{
  margin:0 12px;background:linear-gradient(135deg,rgba(212,175,55,.1),rgba(212,175,55,.05));
  border:1px solid rgba(212,175,55,.25);border-radius:var(--radius);padding:12px 14px;
}
.notice-box .n-title{font-size:13px;color:var(--primary);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.notice-box .n-text{font-size:12px;color:var(--text2);line-height:1.8}

/* نوار پایین */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid rgba(212,175,55,.2);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;text-decoration:none;color:var(--text2);transition:.2s;border:none;background:none;font-family:var(--font)}
.nav-item.active{color:var(--primary)}
.nav-item .nav-icon{font-size:22px}
.nav-item .nav-label{font-size:10px}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px var(--primary))}
</style>
</head>

    if(c.shopSub)      document.getElementById('shopSub').textContent      = c.shopSub;
    if(c.bannerTitle)  document.getElementById('bannerTitle').textContent  = c.bannerTitle;
    if(c.bannerDesc)   document.getElementById('bannerDesc').textContent   = c.bannerDesc;
    if(c.bannerBtn)    document.getElementById('bannerBtn').textContent    = c.bannerBtn;
    if(c.noticeTitle)  document.getElementById('noticeTitle').textContent  = c.noticeTitle;
    if(c.noticeText)   document.getElementById('noticeText').textContent   = c.noticeText;

    // لوگو
    if(c.logoImg)      document.getElementById('headerLogo').src           = c.logoImg;

    // بنر عکس
    if(c.bannerImg){
      var bw = document.getElementById('bannerWrap');
      bw.style.backgroundImage = 'url('+c.bannerImg+')';
      bw.style.backgroundSize = 'cover';
    }

    // محصولات پرفروش
    var prods = c.topProducts || defaultProducts();
    renderProducts(prods);

  }catch(e){}
}

function defaultProducts(){
  return [
    {name:'تسبیح کریستال',price:'۱۲۰,۰۰۰',img:''},
    {name:'مهر نماز',price:'۴۵,۰۰۰',img:''},
    {name:'چادر مجلسی',price:'۳۸۰,۰۰۰',img:''},
    {name:'عطر حرم',price:'۲۱۰,۰۰۰',img:''},
  ];
}

function renderProducts(prods){
  var el = document.getElementById('productsScroll');
  el.innerHTML = prods.map(function(p){
    return '<div class="product-card" onclick="location.href=\'products.html\'">'
      +(p.img?'<img src="'+p.img+'" alt="'+p.name+'">'
              :'<div style="height:110px;background:linear-gradient(135deg,#1a1a1a,#2a2a1a);display:flex;align-items:center;justify-content:center;font-size:36px">🛍️</div>')
      +'<div class="p-info">'
      +'<div class="p-name">'+p.name+'</div>'
      +'<div class="p-price" style="display:flex;justify-content:space-between;align-items:center">'
      +'<span>'+p.price+' <span>تومان</span></span>'
      +'<button class="p-add">+</button>'
      +'</div></div></div>';
  }).join('');
}

// اشتراک‌گذاری
function shareApp(){
  if(navigator.share){
    navigator.share({title:'ریحانة نورالزهرا',url:location.href});
  } else {
    navigator.clipboard && navigator.clipboard.writeText(location.href);
    alert('لینک کپی شد!');
  }
}

// نصب PWA
var deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault(); deferredPrompt = e;
});
function installApp(){
  if(deferredPrompt){ deferredPrompt.prompt(); }
  else { alert('برای نصب: منوی مرورگر ← افزودن به صفحه اصلی'); }
}
